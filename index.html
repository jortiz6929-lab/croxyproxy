<!doctype html>
<html lang="en" dir="auto">
<head>
    <base href="/" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; background-color: #fff; margin: 0; padding: 0; color: #333; }
        .wrapper { display: flex; flex-direction: column; min-height: 100vh; }
        .container { flex: 1; max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        .logo { margin-bottom: 40px; }
        .logo img { max-width: 280px; height: auto; }
        .search-box { display: flex; max-width: 650px; margin: 0 auto; background: #fff; border: 1px solid #ddd; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        #uv-address { flex: 1; padding: 18px 20px; border: none; font-size: 17px; outline: none; width: 100%; }
        .go-btn { background-color: #82ac6a; color: white; border: none; padding: 0 35px; cursor: pointer; font-weight: bold; font-size: 17px; transition: 0.2s; }
        .go-btn:hover { background-color: #5d8248; }
        .promo-area { margin-top: 40px; padding: 20px; background: #f9f9f9; border-radius: 8px; font-size: 14px; color: #666; line-height: 1.6; }
        footer { padding: 20px; font-size: 12px; color: #999; border-top: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="logo">
                <img src="https://www.croxyproxy.com/img/logo.png" alt="CroxyProxy">
            </div>
            <form id="uv-form">
                <div class="search-box">
                    <input id="uv-address" type="text" placeholder="Enter web address or search terms" autocomplete="off" autofocus>
                    <button type="submit" class="go-btn">Go!</button>
                </div>
            </form>
            <div class="promo-area">
                <p><strong>CroxyProxy</strong> is now optimized with the <strong>Ultraviolet Node Engine</strong>.</p>
            </div>
        </div>
        <footer>&copy; 2026 CroxyProxy | Powered by Ultraviolet</footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.0.2/dist/uv.bundle.js"></script>
    <script src="uv.config.js"></script>
    <script>
        "use strict";
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: '/service/' });
            });
        }
        const form = document.getElementById('uv-form');
        const address = document.getElementById('uv-address');
        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            let url = address.value.trim();
            if (!url) return;
            if (!url.includes('.') || url.includes(' ')) {
                url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
            } else if (!url.startsWith('http')) {
                url = 'https://' + url;
            }
            location.href = '/service/' + __uv$config.encodeUrl(url);
        });
    </script>
